<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Frames – Frames Mockup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #dcdce4;
    background-image:
      radial-gradient(ellipse at 25% 30%, rgba(210,215,235,.7) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 75%, rgba(195,195,215,.6) 0%, transparent 50%);
    padding: 60px 32px;
  }

  /* ── TOKENS ── */
  :root {
    --frames-shadow-device:       0 32px 80px rgba(0,0,0,.40), 0 8px 24px rgba(0,0,0,.22);

    /* Laptop — silver aluminum */
    --frames-laptop-shell-top:    #d0d0d0;
    --frames-laptop-shell-mid:    #b8b8b8;
    --frames-laptop-shell-bot:    #a8a8a8;
    --frames-laptop-bezel:        #111111;
    --frames-laptop-hinge:        #909090;
    --frames-laptop-base-top:     #c0c0c0;
    --frames-laptop-base-bot:     #a0a0a0;
    --frames-laptop-camera:       #0f0f0f;

    /* Tablet — space black (per image reference) */
    --frames-tablet-shell-top:    #1e1e20; /* (*) dark per image */
    --frames-tablet-shell-bot:    #0e0e10; /* (*) dark per image */

    /* Phone — space black */
    --frames-phone-shell-outer:   #1c1c1e;
    --frames-phone-shell-inner:   #111111;
    --frames-phone-btn:           #282828;
    --frames-phone-notch:         #070707;
  }

  /* ── DEVICES ROW ── */
  .devices-row {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: clamp(20px, 3.5vw, 60px);
    max-width: 1400px;
    width: 100%;
  }

  /* ── SHARED BLOCK ROOT ── */
  .wp-block-frames-device {
    position: relative;
    flex-shrink: 0;
  }

  /* Transparent content-slot indicator */
  .wp-block-frames-device__screen {
    background-color: #efefef;
    background-image:
      repeating-conic-gradient(rgba(0,0,0,.055) 0% 25%, transparent 0% 50%);
    background-size: 14px 14px;
  }

  /* Hardware button — shared geometry/surface */
  .wp-block-frames-device__btn {
    position: absolute;
    box-shadow:
      inset 0  1px 0 rgba(255,255,255,.10),
      inset 0 -1px 0 rgba(0,0,0,.30);
  }
  .wp-block-frames-device__btn--power    { border-radius: 0 2px 2px 0; }
  .wp-block-frames-device__btn--vol-up,
  .wp-block-frames-device__btn--vol-down,
  .wp-block-frames-device__btn--silent   { border-radius: 2px 0 0 2px; }


  /* ════════════════════════════════════════════
     LAPTOP
  ════════════════════════════════════════════ */
  .wp-block-frames-device--laptop {
    width: clamp(260px, 50vw, 680px);
    filter:
      drop-shadow(0 28px 52px rgba(0,0,0,.36))
      drop-shadow(0 8px 18px rgba(0,0,0,.20));
  }

  /* Lid — silver outer shell, 16:10 screen ratio */
  .wp-block-frames-device--laptop .wp-block-frames-device__lid {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: linear-gradient(
      165deg,
      var(--frames-laptop-shell-top)  0%,
      var(--frames-laptop-shell-mid) 55%,
      var(--frames-laptop-shell-bot) 100%
    );
    border-radius: 10px 10px 0 0;
    /* Silver border visible around bezel: top/sides/bottom */
    padding: 2.2% 1.8% 2.8%;
    position: relative;
    box-shadow:
      inset 0  1px 0 rgba(255,255,255,.75),
      inset  1px 0 0 rgba(255,255,255,.30),
      inset -1px 0 0 rgba(255,255,255,.30),
      inset 0 -1px 0 rgba(0,0,0,.10);
  }

  /* Bezel — black inner frame */
  .wp-block-frames-device--laptop .wp-block-frames-device__bezel {
    width: 100%;
    height: 100%;
    background: var(--frames-laptop-bezel);
    border-radius: 5px 5px 0 0;
    position: relative;
    overflow: hidden;
  }

  /* Screen — fills bezel, transparent content slot */
  .wp-block-frames-device--laptop .wp-block-frames-device__screen {
    position: absolute;
    inset: 0;
    border-radius: 4px 4px 0 0;
  }

  /* Camera notch — dark pill hanging from top of bezel into screen */
  .wp-block-frames-device--laptop .wp-block-frames-device__notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: clamp(36px, 8%, 58px);
    height: clamp(5px, 1.5%, 11px);
    background: var(--frames-laptop-camera);
    border-radius: 0 0 6px 6px;
    z-index: 2;
  }
  /* Camera lens dot */
  .wp-block-frames-device--laptop .wp-block-frames-device__notch::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #1c1c1c;
    box-shadow: 0 0 0 1.5px rgba(255,255,255,.04);
  }

  /* Hinge — thin pivot strip */
  .wp-block-frames-device--laptop .wp-block-frames-device__hinge {
    width: 100%;
    height: clamp(5px, 0.55vw, 8px);
    background: linear-gradient(
      to bottom,
      var(--frames-laptop-hinge)  0%,
      #b4b4b4 55%,
      #c8c8c8 100%
    );
    position: relative;
  }
  .wp-block-frames-device--laptop .wp-block-frames-device__hinge::before {
    content: '';
    position: absolute;
    top: 2px; left: 6%; right: 6%;
    height: 1.5px;
    background: rgba(0,0,0,.18);
    border-radius: 9999px;
  }

  /* Base — keyboard deck, slight trapezoid for depth */
  .wp-block-frames-device--laptop .wp-block-frames-device__base {
    width: 104%;
    margin-left: -2%;
    height: clamp(14px, 1.85vw, 26px);
    background: linear-gradient(
      to bottom,
      var(--frames-laptop-base-top) 0%,
      var(--frames-laptop-base-bot) 100%
    );
    clip-path: polygon(-1% 0%, 101% 0%, 105% 100%, -5% 100%);
    position: relative;
    box-shadow:
      0 8px 28px rgba(0,0,0,.28),
      0 2px 8px  rgba(0,0,0,.18);
  }
  /* Bottom dark edge */
  .wp-block-frames-device--laptop .wp-block-frames-device__base::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(0,0,0,.18);
    border-radius: 0 0 3px 3px;
  }
  /* Trackpad indent */
  .wp-block-frames-device--laptop .wp-block-frames-device__base::before {
    content: '';
    position: absolute;
    top: 14%; left: 50%;
    transform: translateX(-50%);
    width: 20%; height: 64%;
    border: 1px solid rgba(0,0,0,.14);
    border-radius: 3px;
    background: rgba(0,0,0,.04);
  }


  /* ════════════════════════════════════════════
     TABLET
  ════════════════════════════════════════════ */
  .wp-block-frames-device--tablet {
    width: clamp(120px, 20vw, 290px);
    filter:
      drop-shadow(0 26px 52px rgba(0,0,0,.50))
      drop-shadow(0 6px 16px rgba(0,0,0,.28));
  }

  .wp-block-frames-device--tablet .wp-block-frames-device__shell {
    width: 100%;
    aspect-ratio: 3 / 4;
    background: linear-gradient(
      150deg,
      var(--frames-tablet-shell-top)  0%,
      var(--frames-tablet-shell-bot) 100%
    );
    border-radius: clamp(14px, 5%, 22px);
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0  1px 0 rgba(255,255,255,.07),
      inset 0 -1px 0 rgba(0,0,0,.35),
      inset  1px 0 0 rgba(255,255,255,.04),
      inset -1px 0 0 rgba(0,0,0,.20),
      0 0 0 1px rgba(255,255,255,.05);
  }

  /* Screen slot */
  .wp-block-frames-device--tablet .wp-block-frames-device__screen {
    position: absolute;
    inset: 2.2%;
    border-radius: clamp(10px, 3.4%, 18px);
    overflow: hidden;
  }

  /* Dynamic Island pill */
  .wp-block-frames-device--tablet .wp-block-frames-device__notch {
    position: absolute;
    top: 1.2%; left: 50%;
    transform: translateX(-50%);
    width: clamp(38px, 28%, 66px);
    height: clamp(7px, 1.6%, 13px);
    background: var(--frames-phone-notch);
    border-radius: 9999px;
    z-index: 10;
  }


  /* ════════════════════════════════════════════
     PHONE
  ════════════════════════════════════════════ */
  .wp-block-frames-device--phone {
    width: clamp(80px, 13vw, 196px);
    filter:
      drop-shadow(0 26px 52px rgba(0,0,0,.54))
      drop-shadow(0 6px 16px rgba(0,0,0,.32));
  }

  .wp-block-frames-device--phone .wp-block-frames-device__shell {
    width: 100%;
    aspect-ratio: 9 / 19.5;
    background: linear-gradient(
      150deg,
      var(--frames-phone-shell-outer)  0%,
      var(--frames-phone-shell-inner) 100%
    );
    border-radius: clamp(24px, 11.5%, 44px);
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0  1px 0 rgba(255,255,255,.09),
      inset 0 -1px 0 rgba(0,0,0,.35),
      inset  1px 0 0 rgba(255,255,255,.05),
      inset -1px 0 0 rgba(0,0,0,.22),
      0 0 0 1px rgba(255,255,255,.05);
  }

  /* Screen slot */
  .wp-block-frames-device--phone .wp-block-frames-device__screen {
    position: absolute;
    inset: 2%;
    border-radius: clamp(20px, 9.5%, 38px);
    overflow: hidden;
  }

  /* Dynamic Island pill */
  .wp-block-frames-device--phone .wp-block-frames-device__notch {
    position: absolute;
    top: 1.0%; left: 50%;
    transform: translateX(-50%);
    width: clamp(36px, 34%, 62px);
    height: clamp(6px, 1.5%, 12px);
    background: var(--frames-phone-notch);
    border-radius: 9999px;
    z-index: 10;
  }

  /* Side buttons — positioned relative to block root (outside __shell overflow) */
  .wp-block-frames-device--phone .wp-block-frames-device__btn {
    background: linear-gradient(
      to right,
      var(--frames-phone-btn)  0%,
      #363638 50%,
      var(--frames-phone-btn) 100%
    );
  }
  .wp-block-frames-device--phone .wp-block-frames-device__btn--power {
    right: -3px; top: 29%;
    width: 3px; height: 13%;
  }
  .wp-block-frames-device--phone .wp-block-frames-device__btn--vol-up {
    left: -3px; top: 25%;
    width: 3px; height: 9%;
  }
  .wp-block-frames-device--phone .wp-block-frames-device__btn--vol-down {
    left: -3px; top: 36%;
    width: 3px; height: 9%;
  }
  .wp-block-frames-device--phone .wp-block-frames-device__btn--silent {
    left: -3px; top: 17%;
    width: 3px; height: 5%;
  }
</style>
</head>
<body>

<div class="devices-row">

  <!-- ══════════════════════════════════════════
       LAPTOP
       Block: wp-block-frames-device --laptop
  ══════════════════════════════════════════ -->
  <div class="wp-block-frames-device wp-block-frames-device--laptop">

    <div class="wp-block-frames-device__lid">
      <div class="wp-block-frames-device__bezel">
        <div class="wp-block-frames-device__notch" aria-hidden="true"></div>
        <div class="wp-block-frames-device__screen" role="region" aria-label="Laptop screen"></div>
      </div>
    </div>

    <div class="wp-block-frames-device__hinge" aria-hidden="true"></div>
    <div class="wp-block-frames-device__base"  aria-hidden="true"></div>

  </div>


  <!-- ══════════════════════════════════════════
       TABLET
       Block: wp-block-frames-device --tablet
  ══════════════════════════════════════════ -->
  <div class="wp-block-frames-device wp-block-frames-device--tablet">

    <div class="wp-block-frames-device__shell">
      <div class="wp-block-frames-device__notch" aria-hidden="true"></div>
      <div class="wp-block-frames-device__screen" role="region" aria-label="Tablet screen"></div>
    </div>

  </div>


  <!-- ══════════════════════════════════════════
       PHONE
       Block: wp-block-frames-device --phone
  ══════════════════════════════════════════ -->
  <div class="wp-block-frames-device wp-block-frames-device--phone">

    <div class="wp-block-frames-device__shell">
      <div class="wp-block-frames-device__notch" aria-hidden="true"></div>
      <div class="wp-block-frames-device__screen" role="region" aria-label="Phone screen"></div>
    </div>

    <!-- Buttons sit outside __shell so they escape overflow:hidden -->
    <div class="wp-block-frames-device__btn wp-block-frames-device__btn--silent"   aria-hidden="true"></div>
    <div class="wp-block-frames-device__btn wp-block-frames-device__btn--vol-up"   aria-hidden="true"></div>
    <div class="wp-block-frames-device__btn wp-block-frames-device__btn--vol-down" aria-hidden="true"></div>
    <div class="wp-block-frames-device__btn wp-block-frames-device__btn--power"    aria-hidden="true"></div>

  </div>

</div>

</body>
</html>
