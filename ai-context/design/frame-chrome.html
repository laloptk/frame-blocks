<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrome Browser – Frames Mockup</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #dde1e7;
    background-image:
      radial-gradient(ellipse at 25% 35%, rgba(66,133,244,.14) 0%, transparent 60%),
      radial-gradient(ellipse at 75% 70%, rgba(52,168,83,.10) 0%, transparent 55%);
    padding: 32px 24px;
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* ══════════════════════════════════════════════════════════
     DESIGN SYSTEM TOKENS — Chrome Browser
     Source: Frames Design System :root
     Supplementary tokens marked with (*)
  ══════════════════════════════════════════════════════════ */
  :root {
    /* From design system */
    --frames-chrome-tabstrip:         #dee1e6;
    --frames-chrome-toolbar:          #f1f3f4;
    --frames-chrome-border:           #dadce0;
    --frames-chrome-tab-active:       #ffffff;
    --frames-chrome-tab-inactive:     #c8ccd1;
    --frames-chrome-tab-hover:        #e8eaed;
    --frames-chrome-input-bg:         #ffffff;
    --frames-chrome-input-shadow:     0 1px 3px rgba(0,0,0,0.12);
    --frames-chrome-input-focus:      rgba(66,133,244,0.20);
    --frames-chrome-text:             #202124;
    --frames-chrome-text-secondary:   #5f6368;
    --frames-chrome-url-text:         #202124;
    --frames-chrome-url-domain:       #202124;
    --frames-chrome-icon:             #5f6368;
    --frames-chrome-blue:             #1a73e8;
    --frames-chrome-blue-alt:         #4285f4;
    --frames-chrome-bookmarks-bg:     #f1f3f4;
    --frames-chrome-favicon-bg:       linear-gradient(135deg, #4285f4 0%, #34a853 100%);
    /* (*) Supplementary */
    --frames-chrome-tab-shadow:       0 1px 3px rgba(0,0,0,0.14);
    --frames-chrome-profile-bg:       #1a73e8;
    --frames-chrome-win-close-hover:  #c42b1c;
  }

  /* ══════════════════════════════════════════════════════════
     BLOCK ROOT — wp-block-frames-chrome
     Aspect ratio 4:2.7. Fluid via container-type + cqw.
     No transform: scale() anywhere.
  ══════════════════════════════════════════════════════════ */
  .wp-block-frames-chrome {
    width: min(94vw, calc(94vh * (4 / 2.7)));
    aspect-ratio: 4 / 2.7;
    container-type: size;
    border-radius: 8px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,.15),
      0 2px 4px rgba(0,0,0,.10),
      0 20px 60px rgba(0,0,0,.28),
      0 6px 16px rgba(0,0,0,.16);
    overflow: hidden;
    background: transparent;
    display: flex;
    flex-direction: column;
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* ── Non-viewport chrome shell ── */
  .wp-block-frames-chrome__chrome {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  /* ══ TAB STRIP ══
     Tabs sit at the bottom of the row (align-items: flex-end).
     Win controls fill the full row height (align-self: stretch), flush to the right.
  ═════════════════════════════════════════════════════════ */
  .wp-block-frames-chrome__tabstrip {
    display: flex;
    align-items: flex-end;
    background: var(--frames-chrome-tabstrip);
    padding: 0 0 0 clamp(8px, 1.4cqw, 12px);
    min-height: clamp(36px, 5.35cqw, 46px);
  }

  /* Windows-style window controls — top-right of tabstrip */
  .wp-block-frames-chrome__win-controls {
    display: flex;
    align-items: stretch;
    align-self: stretch;
    flex-shrink: 0;
    margin-left: auto;
  }

  .wp-block-frames-chrome__win-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: clamp(32px, 5.35cqw, 46px);
    font-size: clamp(8px, 1.16cqw, 11px);
    color: var(--frames-chrome-text-secondary);
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .wp-block-frames-chrome__win-btn:hover { background: rgba(0,0,0,.08); }
  .wp-block-frames-chrome__win-btn--close:hover {
    background: var(--frames-chrome-win-close-hover);
    color: #ffffff;
  }

  /* Tabs container */
  .wp-block-frames-chrome__tabs {
    display: flex;
    align-items: flex-end;
    flex: 1;
    gap: clamp(1px, 0.23cqw, 2px);
    overflow: hidden;
    min-width: 0;
  }

  /* Individual tab */
  .wp-block-frames-chrome__tab {
    display: flex;
    align-items: center;
    gap: clamp(3px, 0.58cqw, 6px);
    padding: clamp(5px, 0.93cqw, 8px) clamp(8px, 1.16cqw, 10px);
    height: clamp(24px, 3.72cqw, 32px);
    background: var(--frames-chrome-tab-inactive);
    border-radius: clamp(4px, 0.7cqw, 6px) clamp(4px, 0.7cqw, 6px) 0 0;
    color: var(--frames-chrome-text-secondary);
    cursor: pointer;
    white-space: nowrap;
    min-width: 0;
    max-width: clamp(100px, 20cqw, 180px);
    flex-shrink: 0;
    transition: background .15s;
  }
  .wp-block-frames-chrome__tab:hover { background: var(--frames-chrome-tab-hover); }

  .wp-block-frames-chrome__tab--active {
    background: var(--frames-chrome-tab-active);
    color: var(--frames-chrome-text);
    box-shadow: var(--frames-chrome-tab-shadow);
    z-index: 1;
  }

  /* Tab favicon */
  .wp-block-frames-chrome__tab-favicon {
    width: clamp(10px, 1.4cqw, 14px);
    height: clamp(10px, 1.4cqw, 14px);
    border-radius: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(8px, 1.16cqw, 12px);
    color: var(--frames-chrome-text-secondary);
  }
  .wp-block-frames-chrome__tab-favicon--google {
    background: var(--frames-chrome-favicon-bg);
    border-radius: 2px;
    color: #ffffff;
    font-size: clamp(6px, 0.93cqw, 9px);
  }

  /* Tab title */
  .wp-block-frames-chrome__tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
    font-size: clamp(9px, 1.28cqw, 12px);
    color: inherit;
  }

  /* Tab close button */
  .wp-block-frames-chrome__tab-close {
    flex-shrink: 0;
    width: clamp(12px, 1.4cqw, 14px);
    height: clamp(12px, 1.4cqw, 14px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(6px, 0.7cqw, 8px);
    color: var(--frames-chrome-icon);
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s, background .15s;
  }
  .wp-block-frames-chrome__tab:hover .wp-block-frames-chrome__tab-close,
  .wp-block-frames-chrome__tab--active .wp-block-frames-chrome__tab-close { opacity: 1; }
  .wp-block-frames-chrome__tab-close:hover { background: rgba(0,0,0,.10); }

  /* New tab (+) button */
  .wp-block-frames-chrome__tab-new {
    flex-shrink: 0;
    align-self: center;
    width: clamp(20px, 2.79cqw, 24px);
    height: clamp(20px, 2.79cqw, 24px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: clamp(10px, 1.4cqw, 14px);
    color: var(--frames-chrome-icon);
    margin-left: clamp(2px, 0.47cqw, 4px);
    transition: background .15s;
  }
  .wp-block-frames-chrome__tab-new:hover { background: rgba(0,0,0,.08); }

  /* ══ TOOLBAR ══
     Navigation buttons + omnibox + right-side icons.
  ═══════════════════════════════════════════════════ */
  .wp-block-frames-chrome__toolbar {
    display: flex;
    align-items: center;
    background: var(--frames-chrome-toolbar);
    border-bottom: 1px solid var(--frames-chrome-border);
    padding: clamp(4px, 0.7cqw, 6px) clamp(8px, 1.16cqw, 10px);
    gap: clamp(2px, 0.35cqw, 3px);
  }

  /* Navigation buttons */
  .wp-block-frames-chrome__nav {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }

  .wp-block-frames-chrome__nav-btn {
    width: clamp(22px, 3.26cqw, 28px);
    height: clamp(22px, 3.26cqw, 28px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: clamp(10px, 1.4cqw, 13px);
    color: var(--frames-chrome-icon);
    transition: background .15s;
    flex-shrink: 0;
  }
  .wp-block-frames-chrome__nav-btn:hover { background: rgba(0,0,0,.08); }
  .wp-block-frames-chrome__nav-btn--disabled {
    color: rgba(0,0,0,.22);
    cursor: default;
  }
  .wp-block-frames-chrome__nav-btn--disabled:hover { background: transparent; }

  /* Omnibox (address/search pill) */
  .wp-block-frames-chrome__omnibox {
    flex: 1;
    height: clamp(22px, 3.49cqw, 30px);
    background: var(--frames-chrome-input-bg);
    border: 1px solid var(--frames-chrome-border);
    border-radius: clamp(12px, 2.33cqw, 20px);
    box-shadow: var(--frames-chrome-input-shadow);
    display: flex;
    align-items: center;
    gap: clamp(4px, 0.7cqw, 7px);
    cursor: text;
    padding: 0 clamp(8px, 1.4cqw, 14px);
    min-width: 0;
    margin: 0 clamp(4px, 0.7cqw, 8px);
  }

  .wp-block-frames-chrome__omnibox-lock {
    font-size: clamp(8px, 1.16cqw, 11px);
    color: var(--frames-chrome-icon);
    flex-shrink: 0;
  }

  .wp-block-frames-chrome__omnibox-url {
    flex: 1;
    font-size: clamp(9px, 1.4cqw, 13px);
    color: var(--frames-chrome-url-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .wp-block-frames-chrome__omnibox-star {
    flex-shrink: 0;
    font-size: clamp(9px, 1.16cqw, 12px);
    color: var(--frames-chrome-icon);
    cursor: pointer;
    padding: clamp(2px, 0.35cqw, 3px);
    border-radius: 3px;
    transition: color .15s;
  }
  .wp-block-frames-chrome__omnibox-star:hover { color: var(--frames-chrome-blue); }

  /* Toolbar right-side icons */
  .wp-block-frames-chrome__toolbar-right {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }

  .wp-block-frames-chrome__toolbar-icon {
    width: clamp(22px, 3.26cqw, 28px);
    height: clamp(22px, 3.26cqw, 28px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: clamp(11px, 1.51cqw, 15px);
    color: var(--frames-chrome-icon);
    transition: background .15s;
    flex-shrink: 0;
  }
  .wp-block-frames-chrome__toolbar-icon:hover { background: rgba(0,0,0,.08); }

  /* Profile avatar bubble */
  .wp-block-frames-chrome__profile {
    width: clamp(16px, 2.33cqw, 20px);
    height: clamp(16px, 2.33cqw, 20px);
    border-radius: 50%;
    background: var(--frames-chrome-profile-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(8px, 1.16cqw, 10px);
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    flex-shrink: 0;
    margin: 0 clamp(2px, 0.35cqw, 4px);
  }

  /* ── VIEWPORT (transparent) ── */
  .wp-block-frames-chrome__viewport {
    flex: 1;
    background: transparent;
    position: relative;
    overflow: hidden;
  }

  /* Faint diagonal stripe so the empty frame is visible */
  .wp-block-frames-chrome__viewport::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        45deg,
        rgba(0,0,0,.015) 0px,
        rgba(0,0,0,.015) 1px,
        transparent 1px,
        transparent 20px
      );
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="wp-block-frames-chrome">

  <!-- ── ALL CHROME UI ── -->
  <div class="wp-block-frames-chrome__chrome">

    <!-- TAB STRIP: tabs + new-tab button + window controls (top right) -->
    <div class="wp-block-frames-chrome__tabstrip">

      <!-- Tabs -->
      <div class="wp-block-frames-chrome__tabs">

        <!-- Inactive tab -->
        <div class="wp-block-frames-chrome__tab">
          <div class="wp-block-frames-chrome__tab-favicon">
            <i class="fa-regular fa-compass"></i>
          </div>
          <span class="wp-block-frames-chrome__tab-title">New Tab</span>
          <div class="wp-block-frames-chrome__tab-close">
            <i class="fa-solid fa-xmark"></i>
          </div>
        </div>

        <!-- Active tab -->
        <div class="wp-block-frames-chrome__tab wp-block-frames-chrome__tab--active">
          <div class="wp-block-frames-chrome__tab-favicon wp-block-frames-chrome__tab-favicon--google">
            <i class="fa-brands fa-google"></i>
          </div>
          <span class="wp-block-frames-chrome__tab-title">Google</span>
          <div class="wp-block-frames-chrome__tab-close">
            <i class="fa-solid fa-xmark"></i>
          </div>
        </div>

      </div><!-- /tabs -->

      <!-- New tab button -->
      <div class="wp-block-frames-chrome__tab-new" title="New tab">
        <i class="fa-solid fa-plus"></i>
      </div>

      <!-- Windows-style window controls (top right) -->
      <div class="wp-block-frames-chrome__win-controls">
        <div class="wp-block-frames-chrome__win-btn wp-block-frames-chrome__win-btn--min" title="Minimize">
          <i class="fa-solid fa-minus"></i>
        </div>
        <div class="wp-block-frames-chrome__win-btn wp-block-frames-chrome__win-btn--max" title="Maximize">
          <i class="fa-regular fa-square"></i>
        </div>
        <div class="wp-block-frames-chrome__win-btn wp-block-frames-chrome__win-btn--close" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </div>
      </div>

    </div><!-- /tabstrip -->

    <!-- TOOLBAR: navigation + omnibox + right icons -->
    <div class="wp-block-frames-chrome__toolbar">

      <!-- Navigation -->
      <div class="wp-block-frames-chrome__nav">
        <div class="wp-block-frames-chrome__nav-btn wp-block-frames-chrome__nav-btn--disabled" title="Back">
          <i class="fa-solid fa-arrow-left"></i>
        </div>
        <div class="wp-block-frames-chrome__nav-btn wp-block-frames-chrome__nav-btn--disabled" title="Forward">
          <i class="fa-solid fa-arrow-right"></i>
        </div>
        <div class="wp-block-frames-chrome__nav-btn" title="Reload">
          <i class="fa-solid fa-rotate-right"></i>
        </div>
      </div>

      <!-- Omnibox -->
      <div class="wp-block-frames-chrome__omnibox">
        <i class="wp-block-frames-chrome__omnibox-lock fa-solid fa-lock"></i>
        <span class="wp-block-frames-chrome__omnibox-url">google.com</span>
        <i class="wp-block-frames-chrome__omnibox-star fa-regular fa-star"></i>
      </div>

      <!-- Right icons -->
      <div class="wp-block-frames-chrome__toolbar-right">
        <div class="wp-block-frames-chrome__toolbar-icon" title="Extensions">
          <i class="fa-solid fa-puzzle-piece"></i>
        </div>
        <div class="wp-block-frames-chrome__profile" title="Google Account">G</div>
        <div class="wp-block-frames-chrome__toolbar-icon" title="Chrome menu">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
      </div>

    </div><!-- /toolbar -->

  </div><!-- /chrome -->

  <!-- ── TRANSPARENT VIEWPORT ── -->
  <div class="wp-block-frames-chrome__viewport"></div>

</div><!-- /wp-block-frames-chrome -->

</body>
</html>
