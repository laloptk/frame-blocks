<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Post – Frames Mockup</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(131,58,180,.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(40,40,80,.3) 0%, transparent 50%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    padding: 40px 20px;
  }

  /* ── TOKENS ── */
  :root {
    /* Phone shell */
    --frames-phone-shell-outer:       #1c1c1e;
    --frames-phone-shell-inner:       #111111;
    --frames-phone-rail:              rgba(255,255,255,.08);
    --frames-phone-btn:               #2a2a2a;
    --frames-phone-notch:             #111111;
    --frames-phone-home-bar:          rgba(255,255,255,.30);
    --frames-phone-screen-bg:         #ffffff;
    --frames-phone-status-color-dark: #ffffff;
    /* IG light-mode tokens (from design system) */
    --frames-ig-bg:               #fafafa;
    --frames-ig-surface:          #ffffff;
    --frames-ig-border:           #dbdbdb;
    --frames-ig-border-light:     #efefef;
    --frames-ig-text-primary:     #262626;
    --frames-ig-text-secondary:   #8e8e8e;
    --frames-ig-blue:             #0095f6;
    --frames-ig-red:              #ed4956;
    --frames-ig-story-ring:       linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    --frames-ig-font-size-username: 14px;
    --frames-ig-font-size-body:   14px;
    --frames-ig-font-size-meta:   12px;
    --frames-ig-font-weight-bold: 600;
    /* IG dark-mode supplementary (*) */
    --frames-ig-dark-bg:          #000000; /* (*) */
    --frames-ig-dark-surface:     #111111; /* (*) */
    --frames-ig-dark-border:      #1a1a1a; /* (*) */
    --frames-ig-dark-text:        #ffffff; /* (*) */
    --frames-ig-dark-text-dim:    #aaaaaa; /* (*) */
    --frames-ig-dark-text-muted:  #555555; /* (*) */
    --frames-ig-following-border: #555555; /* (*) */
  }

  /* ── PHONE WRAPPER – 9:19.5 aspect ratio ── */
  .wp-block-frames-instagram {
    width: min(360px, 46vw, 80vmin);
    aspect-ratio: 9 / 19.5;
    position: relative;
    flex-shrink: 0;
  }

  /* ── PHONE SHELL ── */
  .wp-block-frames-instagram__shell {
    position: absolute;
    inset: 0;
    border-radius: calc(min(360px, 46vw, 80vmin) * 0.115);
    background: linear-gradient(145deg, var(--frames-phone-shell-outer) 0%, var(--frames-phone-shell-inner) 40%, #111 100%);
    box-shadow:
      0 0 0 1.5px #3a3a3c,
      inset 0 0 0 1px var(--frames-phone-rail),
      0 40px 100px rgba(0,0,0,.7),
      0 10px 30px rgba(0,0,0,.5),
      4px 0 8px rgba(0,0,0,.4),
      -4px 0 8px rgba(0,0,0,.4);
  }
  .wp-block-frames-instagram__shell::before {
    content: '';
    position: absolute;
    left: -3px;
    top: 22%;
    width: 3px;
    height: 8%;
    background: #3a3a3c;
    border-radius: 2px 0 0 2px;
    box-shadow:
      0 calc(min(360px,46vw,80vmin) * 0.12) 0 #3a3a3c,
      0 calc(min(360px,46vw,80vmin) * 0.21) 0 #3a3a3c;
  }
  .wp-block-frames-instagram__shell::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 28%;
    width: 3px;
    height: 12%;
    background: #3a3a3c;
    border-radius: 0 2px 2px 0;
  }

  /* ── SCREEN AREA ── */
  .wp-block-frames-instagram__screen {
    position: absolute;
    top: 2%; left: 3%; right: 3%; bottom: 2%;
    border-radius: calc(min(360px, 46vw, 80vmin) * 0.09);
    background: var(--frames-ig-dark-bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── NOTCH ── */
  .wp-block-frames-instagram__notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 35%; height: 3.5%;
    background: var(--frames-phone-notch);
    border-radius: 0 0 18px 18px;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wp-block-frames-instagram__notch::after {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #111;
    box-shadow: inset 0 0 0 1.5px #2c2c2e;
  }

  /* ── STATUS BAR ── */
  .wp-block-frames-instagram__status-bar {
    flex-shrink: 0;
    height: 5%;
    background: var(--frames-ig-dark-bg);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 6% 2%;
    padding-top: 3.5%;
    font-size: calc(min(360px, 46vw, 80vmin) * 0.031);
    font-weight: 600;
    color: var(--frames-phone-status-color-dark);
  }
  .wp-block-frames-instagram__status-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .wp-block-frames-instagram__battery {
    display: flex;
    align-items: center;
    gap: 1px;
  }
  .wp-block-frames-instagram__battery-body {
    width: 16px; height: 8px;
    border: 1.5px solid var(--frames-phone-status-color-dark);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .wp-block-frames-instagram__battery-fill {
    position: absolute;
    inset: 1px; right: 3px;
    background: var(--frames-phone-status-color-dark);
    border-radius: 1px;
  }
  .wp-block-frames-instagram__battery-cap {
    width: 2px; height: 4px;
    background: var(--frames-phone-status-color-dark);
    border-radius: 0 1px 1px 0;
  }
  .wp-block-frames-instagram__signal {
    display: flex;
    align-items: flex-end;
    gap: 1.5px;
    height: 10px;
  }
  .wp-block-frames-instagram__signal span {
    background: var(--frames-phone-status-color-dark);
    width: 2.5px;
    border-radius: 1px;
  }
  .wp-block-frames-instagram__signal span:nth-child(1) { height: 30%; }
  .wp-block-frames-instagram__signal span:nth-child(2) { height: 55%; }
  .wp-block-frames-instagram__signal span:nth-child(3) { height: 75%; }
  .wp-block-frames-instagram__signal span:nth-child(4) { height: 100%; }

  /* ── SCROLLABLE CONTENT ── */
  .wp-block-frames-instagram__app-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: var(--frames-ig-dark-bg);
  }
  .wp-block-frames-instagram__app-content::-webkit-scrollbar { display: none; }

  /* ── HOME BAR ── */
  .wp-block-frames-instagram__home-bar {
    flex-shrink: 0;
    height: 3.5%;
    background: var(--frames-ig-dark-bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wp-block-frames-instagram__home-bar::after {
    content: '';
    width: 35%; height: 4px;
    background: var(--frames-phone-home-bar);
    border-radius: 4px;
  }

  /* ════════════════════════════════════
     INSTAGRAM APP UI
  ════════════════════════════════════ */

  /* Top nav */
  .wp-block-frames-instagram__nav {
    background: var(--frames-ig-dark-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px 6px;
    border-bottom: 1px solid var(--frames-ig-dark-border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .wp-block-frames-instagram__nav-back,
  .wp-block-frames-instagram__nav-more {
    color: var(--frames-ig-dark-text);
    display: flex;
    align-items: center;
    font-size: 20px;
  }
  .wp-block-frames-instagram__nav-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--frames-ig-dark-text);
    letter-spacing: .3px;
  }

  /* Post header */
  .wp-block-frames-instagram__post-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    background: var(--frames-ig-dark-bg);
  }
  .wp-block-frames-instagram__user-row {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  /* Avatar with gradient ring */
  .wp-block-frames-instagram__avatar-ring {
    width: 34px; height: 34px;
    border-radius: 50%;
    padding: 2px;
    background: var(--frames-ig-story-ring);
    flex-shrink: 0;
  }
  .wp-block-frames-instagram__avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--frames-ig-dark-bg);
    padding: 2px;
    overflow: hidden;
  }
  .wp-block-frames-instagram__avatar-img {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #3a3a3c, #2c2c2e);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--frames-ig-text-secondary);
    font-size: 13px;
  }

  .wp-block-frames-instagram__user-info {
    display: flex;
    flex-direction: column;
  }
  .wp-block-frames-instagram__username-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .wp-block-frames-instagram__username {
    font-size: 12.5px;
    font-weight: var(--frames-ig-font-weight-bold);
    color: var(--frames-ig-dark-text);
    line-height: 1.2;
  }
  .wp-block-frames-instagram__following-badge {
    border: 1px solid var(--frames-ig-following-border);
    color: var(--frames-ig-dark-text);
    font-size: 10.5px;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 5px;
    line-height: 1.4;
  }
  .wp-block-frames-instagram__more-btn {
    color: var(--frames-ig-dark-text);
    display: flex;
    align-items: center;
    font-size: 18px;
  }

  /* Post image */
  .wp-block-frames-instagram__post-image {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--frames-ig-dark-surface);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    color: var(--frames-ig-text-secondary);
    font-size: 48px;
  }

  /* Actions row */
  .wp-block-frames-instagram__actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px 4px;
    background: var(--frames-ig-dark-bg);
  }
  .wp-block-frames-instagram__actions-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .wp-block-frames-instagram__action-btn {
    display: flex;
    align-items: center;
    color: var(--frames-ig-dark-text);
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-size: 22px;
  }
  .wp-block-frames-instagram__bookmark {
    color: var(--frames-ig-dark-text);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    font-size: 22px;
  }

  /* Likes */
  .wp-block-frames-instagram__likes {
    font-size: 12.5px;
    font-weight: var(--frames-ig-font-weight-bold);
    color: var(--frames-ig-dark-text);
    padding: 2px 12px 4px;
  }

  /* Caption */
  .wp-block-frames-instagram__caption {
    padding: 2px 12px 6px;
    font-size: 12.5px;
    color: var(--frames-ig-dark-text);
    line-height: 1.5;
  }
  .wp-block-frames-instagram__cap-user {
    font-weight: var(--frames-ig-font-weight-bold);
    margin-right: 4px;
  }
  .wp-block-frames-instagram__cap-text {
    color: var(--frames-ig-dark-text);
    opacity: .88;
  }
  .wp-block-frames-instagram__more-text {
    color: var(--frames-ig-dark-text-muted);
    font-size: 12px;
  }

  /* Timestamp */
  .wp-block-frames-instagram__timestamp {
    padding: 2px 12px 10px;
    font-size: 10.5px;
    color: var(--frames-ig-dark-text-muted);
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  /* Bottom nav */
  .wp-block-frames-instagram__bottom-nav {
    background: var(--frames-ig-dark-bg);
    border-top: 1px solid var(--frames-ig-dark-border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 0 4px;
    position: sticky;
    bottom: 0;
  }
  .wp-block-frames-instagram__nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    cursor: pointer;
    position: relative;
    color: var(--frames-ig-dark-text);
    font-size: 22px;
  }
  .wp-block-frames-instagram__nav-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5a5a5a, #3a3a3a);
    border: 2px solid var(--frames-ig-dark-text);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--frames-ig-text-secondary);
    font-size: 11px;
  }
  .wp-block-frames-instagram__active-dot {
    width: 4px; height: 4px;
    background: var(--frames-ig-dark-text);
    border-radius: 50%;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="wp-block-frames-instagram">
  <div class="wp-block-frames-instagram__shell"></div>

  <div class="wp-block-frames-instagram__screen">
    <!-- Notch -->
    <div class="wp-block-frames-instagram__notch"></div>

    <!-- Status bar -->
    <div class="wp-block-frames-instagram__status-bar">
      <span>9:41</span>
      <div class="wp-block-frames-instagram__status-right">
        <div class="wp-block-frames-instagram__signal">
          <span></span><span></span><span></span><span></span>
        </div>
        <i class="fa-solid fa-wifi" style="font-size:11px;"></i>
        <div class="wp-block-frames-instagram__battery">
          <div class="wp-block-frames-instagram__battery-body">
            <div class="wp-block-frames-instagram__battery-fill"></div>
          </div>
          <div class="wp-block-frames-instagram__battery-cap"></div>
        </div>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="wp-block-frames-instagram__app-content">

      <!-- Nav -->
      <div class="wp-block-frames-instagram__nav">
        <div class="wp-block-frames-instagram__nav-back">
          <i class="fa-solid fa-chevron-left"></i>
        </div>
        <span class="wp-block-frames-instagram__nav-title">Post</span>
        <div class="wp-block-frames-instagram__nav-more">
          <i class="fa-solid fa-ellipsis"></i>
        </div>
      </div>

      <!-- Post header -->
      <div class="wp-block-frames-instagram__post-header">
        <div class="wp-block-frames-instagram__user-row">
          <!-- Avatar with gradient ring -->
          <div class="wp-block-frames-instagram__avatar-ring">
            <div class="wp-block-frames-instagram__avatar-inner">
              <div class="wp-block-frames-instagram__avatar-img">
                <i class="fa-solid fa-user"></i>
              </div>
            </div>
          </div>
          <div class="wp-block-frames-instagram__user-info">
            <div class="wp-block-frames-instagram__username-row">
              <span class="wp-block-frames-instagram__username">xmontanox</span>
              <span class="wp-block-frames-instagram__following-badge">Following</span>
            </div>
          </div>
        </div>
        <div class="wp-block-frames-instagram__more-btn">
          <i class="fa-solid fa-ellipsis"></i>
        </div>
      </div>

      <!-- Post image placeholder -->
      <div class="wp-block-frames-instagram__post-image">
        <i class="fa-regular fa-image"></i>
      </div>

      <!-- Actions row -->
      <div class="wp-block-frames-instagram__actions">
        <div class="wp-block-frames-instagram__actions-left">
          <button class="wp-block-frames-instagram__action-btn">
            <i class="fa-regular fa-heart"></i>
          </button>
          <button class="wp-block-frames-instagram__action-btn">
            <i class="fa-regular fa-comment"></i>
          </button>
          <button class="wp-block-frames-instagram__action-btn">
            <i class="fa-regular fa-paper-plane"></i>
          </button>
        </div>
        <button class="wp-block-frames-instagram__bookmark">
          <i class="fa-regular fa-bookmark"></i>
        </button>
      </div>

      <!-- Likes -->
      <div class="wp-block-frames-instagram__likes">17 likes</div>

      <!-- Caption -->
      <div class="wp-block-frames-instagram__caption">
        <span class="wp-block-frames-instagram__cap-user">xmontanox</span>
        <span class="wp-block-frames-instagram__cap-text">El arte de partir rocas y encontrar fósiles adentro...</span>
        <span class="wp-block-frames-instagram__more-text"> more</span>
        <br>
        🪨
      </div>

      <!-- Timestamp -->
      <div class="wp-block-frames-instagram__timestamp">4 days ago</div>

    </div><!-- /app-content -->

    <!-- Bottom navigation -->
    <div class="wp-block-frames-instagram__bottom-nav">
      <div class="wp-block-frames-instagram__nav-item">
        <i class="fa-solid fa-house"></i>
        <div class="wp-block-frames-instagram__active-dot"></div>
      </div>
      <div class="wp-block-frames-instagram__nav-item">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
      <div class="wp-block-frames-instagram__nav-item">
        <i class="fa-regular fa-square-plus"></i>
      </div>
      <div class="wp-block-frames-instagram__nav-item">
        <i class="fa-solid fa-clapperboard"></i>
      </div>
      <div class="wp-block-frames-instagram__nav-item">
        <div class="wp-block-frames-instagram__nav-avatar">
          <i class="fa-solid fa-user"></i>
        </div>
      </div>
    </div>

    <!-- Home bar -->
    <div class="wp-block-frames-instagram__home-bar"></div>

  </div><!-- /screen -->
</div><!-- /wp-block-frames-instagram -->

</body>
</html>
